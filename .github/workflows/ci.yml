name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Per feedback_ci_split_lint_and_test.md: all 5 jobs run in parallel,
# not as chained steps in a single job.  Each surfaces its own failure
# clearly in the GitHub UI.

jobs:
  # --------------------------------------------------------------------------
  # Job 1: ruff check + ruff format --check
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

  # --------------------------------------------------------------------------
  # Job 2: mypy strict
  # --------------------------------------------------------------------------
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Type check
        run: uv run mypy src/ tests/ scripts/

  # --------------------------------------------------------------------------
  # Job 3: deptry — import / dependency hygiene
  # Ensures every import in src/ is declared in [project].dependencies or
  # is stdlib.  This enforces the no-DB / no-framework / no-LLM invariant
  # from the design spec (§15) without a custom AST scanner.
  # --------------------------------------------------------------------------
  deps:
    name: Dependency audit (deptry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Check dependencies
        run: uv run deptry src/

  # --------------------------------------------------------------------------
  # Job 4: pytest
  # VCR cassettes are replayed in CI (no live HTTP calls, no credentials
  # needed).  Cassettes are recorded locally by the maintainer and committed.
  # --------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

  # --------------------------------------------------------------------------
  # Job 5: pip-audit
  # Scans the resolved dependency tree for known CVEs.  Failures are treated
  # as informational — the job uses continue-on-error because audit results
  # may flag transitive dependencies outside the project's direct control.
  # Review audit output in the Actions log; address findings before release.
  # --------------------------------------------------------------------------
  audit:
    name: Security audit (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --group dev

      - name: Audit dependencies
        run: uv run pip-audit
